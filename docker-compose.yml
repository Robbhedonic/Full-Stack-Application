services:
  backend:
    build:
      context: ./backend
    container_name: fullstack-backend
    env_file:
      - ./backend/.env
    ports:
      - '4000:4000'

  frontend:
    build:
      context: ./frontend
    container_name: fullstack-frontend
    environment:
      VITE_API_URL: http://localhost:4000
    ports:
      - '5173:80'
    depends_on:
      - backend