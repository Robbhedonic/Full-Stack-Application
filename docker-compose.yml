services:
  backend:
    build:
      context: ./backend
    container_name: fullstack-backend
    environment:
      - PORT=4000
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: "http://localhost:4000"
    container_name: fullstack-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend